<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ГЛАЗА — Live</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #03050c; --blue: #3b82f6; --green: #10b981; --red: #ef4444;
    --text: #e2e8f0; --muted: #64748b; --border: rgba(59,130,246,.14);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); overflow: hidden;
    font-family: 'SF Mono','Fira Code',Consolas,monospace; }
  [data-screen] { position: fixed; inset: 0; display: none; }
  [data-screen].active { display: flex; }
  video { width: 100%; height: 100%; object-fit: cover; display: block; background: #000; }

  /* ── LOGO ── */
  .logo-bar {
    position: absolute; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    background: linear-gradient(to bottom, rgba(0,0,0,.6), transparent);
  }
  .logo { font-size: 13px; font-weight: 700; letter-spacing: .2em; color: var(--blue); }
  .logo-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue); box-shadow: 0 0 8px var(--blue);
    animation: pulse 1.8s ease-in-out infinite; margin-right: 6px; }
  .flip-btn {
    background: rgba(255,255,255,.08); border: 1px solid var(--border);
    color: var(--muted); padding: 6px 12px; border-radius: 4px;
    font-family: inherit; font-size: 11px; letter-spacing: .06em; cursor: pointer;
    transition: all .2s;
  }
  .flip-btn:hover { color: var(--text); border-color: var(--blue); }

  /* ── PERMISSION ── */
  #s-permission { flex-direction: column; align-items: center; justify-content: center; gap: 24px; }
  .perm-icon { font-size: 48px; }
  .perm-title { font-size: 22px; font-weight: 700; letter-spacing: -.01em; }
  .perm-sub { font-size: 13px; color: var(--muted); line-height: 1.7; text-align: center; max-width: 280px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .perm-err { font-size: 12px; color: var(--red); max-width: 300px; text-align: center; line-height: 1.6; }
  .btn-perm {
    padding: 12px 28px; background: var(--blue); color: #fff;
    border: none; border-radius: 4px; font-family: inherit;
    font-size: 13px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 0 24px rgba(59,130,246,.4); transition: all .2s;
  }
  .btn-perm:hover { background: #2563eb; box-shadow: 0 0 36px rgba(59,130,246,.6); }

  /* ── SETUP ── */
  #s-setup { flex-direction: column; }
  #s-setup video { position: absolute; inset: 0; z-index: 0; }
  .setup-overlay {
    position: relative; z-index: 1; flex: 1;
    display: flex; flex-direction: column; justify-content: flex-end;
    background: linear-gradient(to bottom, transparent 40%, rgba(3,5,12,.92) 100%);
  }
  .setup-form {
    padding: 24px 20px 32px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .setup-label {
    font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--blue);
  }
  .context-input {
    background: rgba(255,255,255,.06); border: 1px solid var(--border);
    border-radius: 4px; padding: 12px 14px;
    color: var(--text); font-family: inherit; font-size: 14px;
    outline: none; transition: border-color .2s;
    -webkit-appearance: none;
  }
  .context-input::placeholder { color: var(--muted); }
  .context-input:focus { border-color: var(--blue); background: rgba(59,130,246,.06); }
  .find-btn {
    padding: 13px; background: var(--blue); color: #fff;
    border: none; border-radius: 4px; font-family: inherit;
    font-size: 13px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
    cursor: pointer; box-shadow: 0 0 20px rgba(59,130,246,.35); transition: all .2s;
  }
  .find-btn:hover { background: #2563eb; }
  .find-btn:active { transform: scale(.98); }

  /* ── WAITING ── */
  #s-waiting { flex-direction: column; }
  #s-waiting video { position: absolute; inset: 0; z-index: 0; }
  .wait-overlay {
    position: relative; z-index: 1; flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    background: rgba(3,5,12,.55);
  }
  .wait-ring {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid rgba(59,130,246,.25);
    border-top-color: var(--blue);
    animation: spin 1.1s linear infinite;
    box-shadow: 0 0 24px rgba(59,130,246,.2);
  }
  .wait-ring::after {
    content: ''; display: block;
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--blue); box-shadow: 0 0 10px var(--blue);
    margin: 26px auto 0;
  }
  .wait-text { font-size: 14px; letter-spacing: .08em; color: var(--text); }
  .wait-hint { font-size: 11px; color: var(--muted); }
  .cancel-btn {
    margin-top: 8px; padding: 8px 20px;
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); border-radius: 4px; font-family: inherit;
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
    transition: all .2s;
  }
  .cancel-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── CONNECTED ── */
  #s-connected { flex-direction: column; }
  .split { flex: 1; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
  .eye-panel { position: relative; overflow: hidden; }
  .eye-badge {
    position: absolute; top: 14px; left: 14px; z-index: 2;
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; font-weight: 600; letter-spacing: .12em;
  }
  .badge-dot {
    width: 5px; height: 5px; border-radius: 50%;
    animation: pulse 1.5s ease-in-out infinite;
  }
  .eye-ctx {
    position: absolute; bottom: 10px; left: 12px; right: 12px; z-index: 2;
    font-size: 11px; color: rgba(255,255,255,.7); letter-spacing: .04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .remote-wait {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    background: #000;
  }
  .remote-wait-ring {
    width: 36px; height: 36px; border-radius: 50%;
    border: 1.5px solid rgba(16,185,129,.3);
    border-top-color: var(--green);
    animation: spin 1.1s linear infinite;
  }

  .ai-bar {
    flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    padding: 0 14px; height: 64px;
    background: rgba(6,11,20,.97);
    border-top: 1px solid var(--border);
  }
  .ai-spin {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    border: 1.5px solid rgba(59,130,246,.25);
    border-top-color: var(--blue);
    animation: spin 1.2s linear infinite;
  }
  .ai-tags { flex: 1; display: flex; flex-wrap: wrap; gap: 4px; overflow: hidden; }
  .ai-tag {
    padding: 2px 8px; border-radius: 2px; font-size: 10px; letter-spacing: .04em;
    background: rgba(255,255,255,.04); color: var(--muted);
    border: 1px solid rgba(255,255,255,.07);
    white-space: nowrap;
  }
  .ai-tag.m { border-color: rgba(16,185,129,.4); color: var(--green); background: rgba(16,185,129,.06); }
  .match-score { flex-shrink: 0; text-align: right; }
  .match-pct { font-size: 22px; font-weight: 700; color: var(--green); line-height: 1; letter-spacing: -.02em; }
  .match-lbl { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
  .leave-btn {
    flex-shrink: 0; padding: 7px 14px;
    background: transparent; border: 1px solid rgba(239,68,68,.3);
    color: rgba(239,68,68,.7); border-radius: 4px; font-family: inherit;
    font-size: 10px; letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
    transition: all .2s;
  }
  .leave-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── PEER LEFT ── */
  #s-peer-left { flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  .pl-icon { font-size: 36px; }
  .pl-title { font-size: 18px; font-weight: 600; letter-spacing: -.01em; }
  .pl-sub { font-size: 13px; color: var(--muted); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  .pl-again {
    padding: 11px 24px; background: var(--blue); color: #fff;
    border: none; border-radius: 4px; font-family: inherit;
    font-size: 12px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .pl-again:hover { background: #2563eb; }

  /* ── KEYFRAMES ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* ── MOBILE ── */
  @media (max-width: 500px) {
    .ai-bar { height: auto; padding: 10px 12px; flex-wrap: wrap; }
    .ai-tags { order: -1; width: 100%; }
    .match-score, .leave-btn { flex-shrink: 0; }
  }
  @media (max-width: 420px) {
    .split { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- ── PERMISSION ── -->
<div id="s-permission" data-screen class="active">
  <div class="perm-icon">👁</div>
  <div class="perm-title">ГЛАЗА</div>
  <p class="perm-sub">Нужен доступ к камере чтобы найти второй взгляд в мире.</p>
  <button class="btn-perm" onclick="startCamera()">Разрешить камеру</button>
  <p class="perm-err" id="perm-err"></p>
</div>

<!-- ── SETUP ── -->
<div id="s-setup" data-screen>
  <div class="logo-bar">
    <span class="logo"><span class="logo-dot"></span>ГЛАЗА</span>
    <button class="flip-btn" onclick="toggleCamera()">⟲ Камера</button>
  </div>
  <video id="local-setup" autoplay muted playsinline></video>
  <div class="setup-overlay">
    <div class="setup-form">
      <div class="setup-label">Что ты сейчас делаешь?</div>
      <input id="context-input" class="context-input" type="text"
        placeholder="кофе · ноутбук · ночь..." maxlength="80"
        onkeydown="if(event.key==='Enter')findEyes()">
      <button class="find-btn" onclick="findEyes()">→ Найти глаза</button>
    </div>
  </div>
</div>

<!-- ── WAITING ── -->
<div id="s-waiting" data-screen>
  <div class="logo-bar">
    <span class="logo"><span class="logo-dot"></span>ГЛАЗА</span>
  </div>
  <video id="local-waiting" autoplay muted playsinline></video>
  <div class="wait-overlay">
    <div class="wait-ring"></div>
    <div class="wait-text" id="wait-text">Ищем похожий взгляд...</div>
    <div class="wait-hint" id="wait-hint"></div>
    <button class="cancel-btn" onclick="cancelWait()">Отмена</button>
  </div>
</div>

<!-- ── CONNECTED ── -->
<div id="s-connected" data-screen>
  <div class="split">
    <div class="eye-panel">
      <video id="local-video" autoplay muted playsinline></video>
      <div class="eye-badge" style="color:#ef4444;">
        <div class="badge-dot" style="background:#ef4444;box-shadow:0 0 6px #ef4444;"></div>
        ГЛАЗА 1
      </div>
      <div class="eye-ctx" id="my-ctx"></div>
    </div>
    <div class="eye-panel">
      <div class="remote-wait" id="remote-wait"><div class="remote-wait-ring"></div></div>
      <video id="remote-video" autoplay playsinline style="display:none;"></video>
      <div class="eye-badge" style="color:#10b981;">
        <div class="badge-dot" style="background:#10b981;box-shadow:0 0 6px #10b981;animation-delay:.4s;"></div>
        ГЛАЗА 2 · СЛИТЫ
      </div>
      <div class="eye-ctx" id="peer-ctx"></div>
    </div>
  </div>
  <div class="ai-bar">
    <div class="ai-spin"></div>
    <div class="ai-tags" id="ai-tags"></div>
    <div class="match-score">
      <div class="match-pct" id="match-pct">—</div>
      <div class="match-lbl">match</div>
    </div>
    <button class="leave-btn" onclick="leaveRoom()">× Выйти</button>
  </div>
</div>

<!-- ── PEER LEFT ── -->
<div id="s-peer-left" data-screen>
  <div class="pl-icon">👁</div>
  <div class="pl-title">Взгляд отключился</div>
  <p class="pl-sub">Второй пользователь вышел из сети</p>
  <button class="pl-again" onclick="searchAgain()">→ Найти другой взгляд</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/stream.js"></script>
</body>
</html>
